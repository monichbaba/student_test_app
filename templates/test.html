<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geography Test</title>
</head>
<body>
    <h1>Geography MCQ Test</h1>
    <form method="POST">
        {% for idx, q in questions %}
            <div style="margin-bottom: 20px;">
                <strong>Q{{ idx + 1 }}: {{ q.question }}</strong><br>
                {% for opt in q.options %}
                    <label>
                        <input type="checkbox" name="q{{ idx }}" value="{{ opt }}">
                        {{ opt }}
                    </label><br>
                {% endfor %}
            </div>
        {% endfor %}
        <button type="submit">Submit Answers</button>
    </form>
</body>
</html>
